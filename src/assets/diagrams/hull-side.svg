<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <rect width="1200" height="500" fill="#0b2a3d"/>
  <text x="600" y="40" text-anchor="middle" fill="#5fb3d9" font-family="sans-serif" font-size="20" letter-spacing="2">
    HULL SIDE PROFILE — PLACEHOLDER DIAGRAM
  </text>

  <!-- waterline -->
  <line x1="0" y1="260" x2="1200" y2="260" stroke="#2a5c78" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="20" y="252" fill="#4a90b8" font-family="sans-serif" font-size="14">waterline</text>

  <!-- hull body -->
  <path d="M 120 180
           L 1020 180
           Q 1120 180 1140 260
           Q 1120 380 1000 400
           L 220 400
           Q 100 380 90 300
           Q 90 220 120 180 Z"
        fill="#123a52" stroke="#3d7ea6" stroke-width="3"/>

  <!-- bow highlight -->
  <path d="M 1020 180 Q 1120 180 1140 260 Q 1120 380 1000 400" fill="none" stroke="#5fb3d9" stroke-width="2" opacity="0.5"/>

  <!-- deck line -->
  <line x1="120" y1="180" x2="1020" y2="180" stroke="#5fb3d9" stroke-width="2" opacity="0.6"/>

  <!-- keel line -->
  <path d="M 220 400 L 1000 400" stroke="#5fb3d9" stroke-width="2" opacity="0.4"/>

  <text x="600" y="470" text-anchor="middle" fill="#3d7ea6" font-family="sans-serif" font-size="13">
    Replace this file with a real hull illustration — hotspot coordinates are percentage-based and will still align.
  </text>
</svg>
