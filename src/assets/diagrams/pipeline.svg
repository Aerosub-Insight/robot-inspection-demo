<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <rect width="1200" height="500" fill="#0b2a3d"/>
  <text x="600" y="40" text-anchor="middle" fill="#5fb3d9" font-family="sans-serif" font-size="20" letter-spacing="2">
    PIPELINE / RISER — PLACEHOLDER DIAGRAM
  </text>

  <!-- straight run -->
  <rect x="80" y="200" width="420" height="60" rx="30" fill="#123a52" stroke="#3d7ea6" stroke-width="3"/>

  <!-- bend -->
  <path d="M 500 230 Q 650 230 680 100" fill="none" stroke="#123a52" stroke-width="60" stroke-linecap="round"/>
  <path d="M 500 230 Q 650 230 680 100" fill="none" stroke="#3d7ea6" stroke-width="3" stroke-linecap="round"/>

  <!-- vertical section -->
  <rect x="650" y="60" width="60" height="220" rx="30" fill="#123a52" stroke="#3d7ea6" stroke-width="3"/>

  <!-- multi-bend section -->
  <path d="M 680 280 Q 750 380 900 380 Q 1050 380 1080 300" fill="none" stroke="#123a52" stroke-width="60" stroke-linecap="round"/>
  <path d="M 680 280 Q 750 380 900 380 Q 1050 380 1080 300" fill="none" stroke="#3d7ea6" stroke-width="3" stroke-linecap="round"/>

  <text x="600" y="470" text-anchor="middle" fill="#3d7ea6" font-family="sans-serif" font-size="13">
    Replace this file with a real pipeline/riser illustration — hotspot coordinates are percentage-based and will still align.
  </text>
</svg>
