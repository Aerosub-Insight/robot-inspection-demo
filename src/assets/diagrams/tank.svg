<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <rect width="1200" height="500" fill="#0b2a3d"/>
  <text x="600" y="40" text-anchor="middle" fill="#5fb3d9" font-family="sans-serif" font-size="20" letter-spacing="2">
    STORAGE TANK — PLACEHOLDER DIAGRAM
  </text>

  <!-- tank body -->
  <rect x="260" y="120" width="680" height="320" rx="18" fill="#123a52" stroke="#3d7ea6" stroke-width="3"/>

  <!-- roof -->
  <path d="M 260 120 L 600 60 L 940 120 Z" fill="#123a52" stroke="#3d7ea6" stroke-width="3"/>

  <!-- internal baffle lines -->
  <line x1="480" y1="120" x2="480" y2="440" stroke="#2a5c78" stroke-width="2" stroke-dasharray="8 6"/>
  <line x1="720" y1="120" x2="720" y2="440" stroke="#2a5c78" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- access hatch -->
  <circle cx="600" cy="90" r="16" fill="none" stroke="#5fb3d9" stroke-width="2"/>

  <text x="600" y="470" text-anchor="middle" fill="#3d7ea6" font-family="sans-serif" font-size="13">
    Replace this file with a real tank interior illustration — hotspot coordinates are percentage-based and will still align.
  </text>
</svg>
